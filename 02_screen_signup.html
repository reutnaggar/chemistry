<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chemistry — הרשמה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600&family=Frank+Ruhl+Libre:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Assistant', sans-serif;
      background: #f0ebe5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .phone {
      width: 340px;
      height: 680px;
      background: #1a1617;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      color: #f5ebe4;
      box-shadow: 0 0 0 8px #0f0d0e, 0 30px 60px rgba(0,0,0,0.3);
    }
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 13px;
      font-weight: 500;
    }
    .battery {
      width: 16px;
      height: 10px;
      border: 1px solid #f5ebe4;
      border-radius: 2px;
      display: inline-block;
      position: relative;
    }
    .battery::before {
      content: '';
      position: absolute;
      top: 1px;
      left: 1px;
      width: 11px;
      height: 6px;
      background: #f5ebe4;
      border-radius: 1px;
    }
    .content {
      height: calc(100% - 44px);
      display: flex;
      flex-direction: column;
      padding: 28px 28px 36px;
    }
    .logo-small {
      width: 56px;
      height: 56px;
      margin: 12px auto 18px;
      display: block;
    }
    .title {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 26px;
      font-weight: 500;
      margin: 0 0 32px;
      color: #f5ebe4;
      text-align: center;
      line-height: 1.3;
    }
    .field-label {
      font-size: 12px;
      color: rgba(245, 235, 228, 0.5);
      margin-bottom: 6px;
      padding-right: 2px;
      display: block;
    }
    .field {
      background: #2a2324;
      border: 0.5px solid rgba(245, 235, 228, 0.08);
      border-radius: 13px;
      padding: 13px 14px;
      font-size: 14px;
      color: #f5ebe4;
      font-family: inherit;
      width: 100%;
      outline: none;
      margin-bottom: 14px;
    }
    .field::placeholder {
      color: rgba(245, 235, 228, 0.3);
    }
    .phone-field {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .phone-field .flag {
      background: #2a2324;
      border: 0.5px solid rgba(245, 235, 228, 0.08);
      border-radius: 13px;
      padding: 13px 10px;
      font-size: 13px;
      color: rgba(245, 235, 228, 0.7);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .phone-field .field {
      flex: 1;
      margin: 0;
    }
    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 24px;
    }
    .checkbox {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1px solid #d85a30;
      background: #d85a30;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .checkbox-text {
      font-size: 12px;
      color: rgba(245, 235, 228, 0.65);
      margin: 0;
      line-height: 1.5;
    }
    .checkbox-link {
      color: rgba(232, 197, 107, 0.8);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .cta {
      width: 100%;
      background: #d85a30;
      border: none;
      border-radius: 16px;
      padding: 15px;
      font-size: 15px;
      font-weight: 500;
      color: #faece7;
      font-family: 'Assistant', sans-serif;
      cursor: pointer;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span class="battery"></span>
    </div>
    <div class="content">
      <svg class="logo-small" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="55" cy="100" rx="28" ry="24" fill="none" stroke="url(#signup-gold)" stroke-width="3.5" transform="rotate(12 55 100)"/>
        <path d="M 82 86 Q 84 82, 88 84 L 118 116 Q 120 119, 116 118 Z" fill="url(#signup-coral)"/>
        <path d="M 118 86 Q 116 82, 112 84 L 82 116 Q 80 119, 84 118 Z" fill="url(#signup-coral)"/>
        <line x1="86" y1="86" x2="114" y2="114" stroke="url(#signup-coral)" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="114" y1="86" x2="86" y2="114" stroke="url(#signup-coral)" stroke-width="3.5" stroke-linecap="round"/>
        <ellipse cx="145" cy="100" rx="28" ry="24" fill="none" stroke="url(#signup-gold)" stroke-width="3.5" transform="rotate(-12 145 100)"/>
        <defs>
          <linearGradient id="signup-gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e8c56b"/>
            <stop offset="100%" stop-color="#a87b22"/>
          </linearGradient>
          <linearGradient id="signup-coral" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e88a5f"/>
            <stop offset="100%" stop-color="#993c1d"/>
          </linearGradient>
        </defs>
      </svg>
      <h2 class="title">ברוכה הבאה :) כיף שבאת</h2>

      <label class="field-label" for="name">שם מלא</label>
      <input type="text" class="field" id="name" placeholder="איך קוראים לך?">

      <label class="field-label" for="email">מייל</label>
      <input type="email" class="field" id="email" placeholder="name@example.com">

      <label class="field-label" for="phone">מספר טלפון</label>
      <div class="phone-field">
        <div class="flag">🇮🇱 +972</div>
        <input type="tel" class="field" id="phone" placeholder="054-123-4567">
      </div>

      <div class="checkbox-row">
        <div class="checkbox">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#faece7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <p class="checkbox-text">אני מעל גיל 18 ומסכימה ל<span class="checkbox-link">תנאי השימוש</span></p>
      </div>

      <button class="cta">מתחילות בקליק</button>
    </div>
  </div>
</body>
</html>
