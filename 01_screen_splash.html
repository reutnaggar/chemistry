<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chemistry — Splash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500&family=Frank+Ruhl+Libre:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Assistant', sans-serif;
      background: #f0ebe5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .phone {
      width: 340px;
      height: 680px;
      background: #1a1617;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      color: #f5ebe4;
      box-shadow: 0 0 0 8px #0f0d0e, 0 30px 60px rgba(0,0,0,0.3);
    }
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 13px;
      font-weight: 500;
    }
    .battery {
      width: 16px;
      height: 10px;
      border: 1px solid #f5ebe4;
      border-radius: 2px;
      display: inline-block;
      position: relative;
    }
    .battery::before {
      content: '';
      position: absolute;
      top: 1px;
      left: 1px;
      width: 11px;
      height: 6px;
      background: #f5ebe4;
      border-radius: 1px;
    }
    .content {
      height: calc(100% - 44px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 32px;
      gap: 44px;
    }
    .slogan {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 22px;
      font-weight: 400;
      margin: 0;
      color: rgba(245, 235, 228, 0.7);
      text-align: center;
      letter-spacing: 0.3px;
      line-height: 1.3;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232, 197, 107, 0.6), transparent);
    }
    .logo-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .atom {
      font-size: 100px;
      line-height: 1;
      background: linear-gradient(135deg, #e8c56b 0%, #a87b22 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 400;
      filter: drop-shadow(0 4px 20px rgba(232, 197, 107, 0.2));
    }
    .title {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 56px;
      font-weight: 500;
      margin: 0;
      color: #f5ebe4;
      letter-spacing: 0.5px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span class="battery"></span>
    </div>
    <div class="content">
      <p class="slogan">אהבה אינה אלגוריתם</p>
      <div class="divider"></div>
      <div class="logo-group">
        <div class="atom">⚛</div>
        <h1 class="title">Chemistry</h1>
      </div>
    </div>
  </div>
</body>
</html>
