<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chemistry — Splash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500&family=Frank+Ruhl+Libre:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Assistant', sans-serif;
      background: #f0ebe5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .phone {
      width: 340px;
      height: 680px;
      background: #1a1617;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      color: #f5ebe4;
      box-shadow: 0 0 0 8px #0f0d0e, 0 30px 60px rgba(0,0,0,0.3);
    }
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 13px;
      font-weight: 500;
    }
    .battery {
      width: 16px;
      height: 10px;
      border: 1px solid #f5ebe4;
      border-radius: 2px;
      display: inline-block;
      position: relative;
    }
    .battery::before {
      content: '';
      position: absolute;
      top: 1px;
      left: 1px;
      width: 11px;
      height: 6px;
      background: #f5ebe4;
      border-radius: 1px;
    }
    .content {
      height: calc(100% - 44px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 32px;
      gap: 44px;
    }
    .slogan {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 22px;
      font-weight: 400;
      margin: 0;
      color: rgba(245, 235, 228, 0.7);
      text-align: center;
      letter-spacing: 0.3px;
      line-height: 1.3;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232, 197, 107, 0.6), transparent);
    }
    .logo-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .logo-svg {
      width: 140px;
      height: 140px;
      filter: drop-shadow(0 4px 24px rgba(232, 197, 107, 0.18));
    }
    .title {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 56px;
      font-weight: 500;
      margin: 0;
      color: #f5ebe4;
      letter-spacing: 0.5px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span class="battery"></span>
    </div>
    <div class="content">
      <p class="slogan">אהבה אינה אלגוריתם</p>
      <div class="divider"></div>
      <div class="logo-group">
        <svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="55" cy="100" rx="28" ry="24" fill="none" stroke="url(#splash-gold)" stroke-width="3.5" transform="rotate(12 55 100)"/>
          <path d="M 82 86 Q 84 82, 88 84 L 118 116 Q 120 119, 116 118 Z" fill="url(#splash-coral)"/>
          <path d="M 118 86 Q 116 82, 112 84 L 82 116 Q 80 119, 84 118 Z" fill="url(#splash-coral)"/>
          <line x1="86" y1="86" x2="114" y2="114" stroke="url(#splash-coral)" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="114" y1="86" x2="86" y2="114" stroke="url(#splash-coral)" stroke-width="3.5" stroke-linecap="round"/>
          <ellipse cx="145" cy="100" rx="28" ry="24" fill="none" stroke="url(#splash-gold)" stroke-width="3.5" transform="rotate(-12 145 100)"/>
          <defs>
            <linearGradient id="splash-gold" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e8c56b"/>
              <stop offset="100%" stop-color="#a87b22"/>
            </linearGradient>
            <linearGradient id="splash-coral" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e88a5f"/>
              <stop offset="100%" stop-color="#993c1d"/>
            </linearGradient>
          </defs>
        </svg>
        <h1 class="title">Chemistry</h1>
      </div>
    </div>
  </div>
</body>
</html>
